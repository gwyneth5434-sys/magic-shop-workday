<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>魔法商店打工日</title>
  <style>
    :root {
      --bg: #120d0a;
      --wood: #2a1710;
      --wood-light: #5a3824;
      --paper: #e7d3a5;
      --paper-deep: #c8aa70;
      --gold: #c99b45;
      --silver: #c7ced4;
      --ink: #2a1b12;
      --red: #a94a3b;
      --green: #5f9164;
      --blue: #5e84a6;
      --shadow: rgba(0, 0, 0, 0.38);
      --glow: rgba(230, 181, 93, 0.3);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--paper);
      background:
        linear-gradient(180deg, rgba(22, 16, 13, 0.86), rgba(10, 7, 6, 0.95)),
        repeating-linear-gradient(90deg, #20130e 0 18px, #1a0f0b 18px 36px);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      letter-spacing: 0;
    }

    button {
      font: inherit;
    }

    .app {
      width: min(1560px, calc(100% - 20px));
      margin: 0 auto;
      padding: 10px 0 14px;
    }

    .screen {
      min-height: calc(100vh - 24px);
      border: 2px solid rgba(201, 155, 69, 0.42);
      background:
        radial-gradient(circle at 12% 12%, rgba(201, 155, 69, 0.15), transparent 28%),
        radial-gradient(circle at 86% 18%, rgba(94, 132, 166, 0.13), transparent 24%),
        linear-gradient(180deg, rgba(58, 34, 23, 0.92), rgba(30, 17, 12, 0.96));
      box-shadow: 0 18px 50px var(--shadow), inset 0 0 60px rgba(0, 0, 0, 0.28);
      overflow: visible;
      position: relative;
    }

    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 8px 8px;
      mix-blend-mode: screen;
    }

    .loading-screen {
      min-height: calc(100vh - 24px);
      border: 0;
      background: #000;
      box-shadow: none;
      display: grid;
      place-items: center;
      padding: 40px;
      color: #f8e7bd;
    }

    .loading-screen::before {
      display: none;
    }

    .loading-panel {
      width: min(620px, 84vw);
      text-align: center;
    }

    .loading-title {
      margin: 0 0 26px;
      font-size: clamp(28px, 5vw, 54px);
      color: #f7d47e;
      text-shadow: 0 0 18px rgba(232, 176, 70, 0.35);
    }

    .loading-copy {
      margin: 0 0 22px;
      font-size: 18px;
      color: rgba(255, 244, 214, 0.82);
    }

    .loading-track {
      height: 16px;
      border: 2px solid rgba(226, 177, 83, 0.72);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.7);
      overflow: hidden;
    }

    .loading-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #8d5b24, #f2c46c, #fff0b4);
      transition: width 180ms ease;
    }

    .loading-percent {
      margin-top: 12px;
      font-size: 18px;
      font-weight: 800;
      color: #ffe29b;
    }

    .cover {
      min-height: calc(100vh - 24px);
      border: 0;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.05), rgba(0, 0, 0, 0.2)),
        url("cover.webp") center / cover no-repeat;
      box-shadow: none;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0 0 9vh;
      overflow: hidden;
    }

    .cover::before {
      display: none;
    }

    .cover-start-btn,
    .intro-start-btn {
      border: 0;
      background: transparent;
      color: #f4dfaa;
      cursor: pointer;
      font-family: inherit;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.82), 0 0 18px rgba(234, 194, 105, 0.55);
    }

    .cover-start-btn:hover,
    .intro-start-btn:hover {
      color: #fff3ca;
      transform: translateY(-2px);
    }

    .intro-screen {
      min-height: calc(100vh - 24px);
      border: 0;
      background: #000;
      box-shadow: none;
      display: grid;
      place-items: center;
      padding: 40px;
      opacity: 1;
      transition: opacity 580ms ease;
    }

    .intro-screen::before {
      display: none;
    }

    .intro-screen.fade-out {
      opacity: 0;
    }

    .intro-card {
      max-width: 720px;
      color: #f6f1e8;
      text-align: center;
      font-size: clamp(18px, 2vw, 25px);
      line-height: 2;
      animation: introFadeIn 820ms ease both;
    }

    .intro-card p {
      margin: 0 0 12px;
    }

    .intro-card strong {
      color: #fff8d8;
      font-weight: 900;
    }

    .intro-start-btn {
      margin-top: 28px;
      font-size: 22px;
      color: #ffffff;
      text-shadow: 0 0 14px rgba(255, 255, 255, 0.35);
    }

    @keyframes introFadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1,
    h2,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 18px;
      color: #f1d283;
      font-size: clamp(48px, 7vw, 90px);
      line-height: 0.98;
      text-shadow: 0 5px 0 #4c2d1d, 0 0 24px var(--glow);
    }


    .primary-btn,
    .next-btn,
    .secondary-btn {
      border: 2px solid #f0ca72;
      color: #21150d;
      background: linear-gradient(180deg, #f3d687, #bd8732);
      box-shadow: 0 5px 0 #5a321d, 0 14px 24px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease;
    }

    .primary-btn:hover,
    .next-btn:hover,
    .secondary-btn:hover,
    .product-card:not(:disabled):hover {
      transform: translateY(-2px);
      filter: brightness(1.06);
    }

    .primary-btn {
      margin-top: 18px;
      padding: 15px 26px;
      min-width: 168px;
      font-size: 18px;
      font-weight: 700;
    }

    .secondary-btn {
      min-height: 42px;
      padding: 8px 14px;
      color: #f1d283;
      background: linear-gradient(180deg, #4f3322, #271710);
      box-shadow: 0 4px 0 #140c08, 0 10px 18px rgba(0, 0, 0, 0.2);
    }

    .business {
      padding: 14px;
    }

    .business.screen,
    .after-sale-screen {
      min-height: auto;
    }

    .stats-bar {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }

    .stat {
      min-height: 54px;
      padding: 8px 10px;
      border: 2px solid rgba(201, 155, 69, 0.45);
      background: rgba(24, 14, 10, 0.7);
      box-shadow: inset 0 -4px 0 rgba(0,0,0,0.18);
    }

    .stat-label {
      color: #cbb98e;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .stat-value {
      color: #f1d283;
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
    }

    .business-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(270px, 0.64fr) minmax(720px, 1.36fr);
      gap: 12px;
      align-items: start;
    }

    .customer-panel,
    .product-panel,
    .product-detail,
    .feedback-panel,
    .after-sale-panel,
    .ending-panel {
      border: 2px solid rgba(231, 211, 165, 0.28);
      background: rgba(20, 12, 8, 0.72);
      box-shadow: 0 12px 24px rgba(0,0,0,0.22), inset 0 0 0 4px rgba(255,255,255,0.025);
    }

    .customer-panel {
      min-height: 0;
      padding: 14px;
    }

    .customer-name {
      color: #f1d283;
      font-size: 23px;
      margin-bottom: 8px;
    }

    .product-panel {
      padding: 12px;
    }

    .panel-title {
      margin: 0 0 12px;
      color: #f1d283;
      font-size: 20px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .product-card {
      min-height: 108px;
      padding: 9px;
      color: #25180f;
      text-align: left;
      cursor: pointer;
      border: 2px solid #21150d;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.28), transparent 44%),
        var(--paper);
      box-shadow: 0 5px 0 #5b3924, inset 0 0 0 2px rgba(255,255,255,0.2);
      transition: transform 120ms ease, filter 120ms ease, opacity 120ms ease;
    }

    .product-card:disabled {
      cursor: default;
      opacity: 0.68;
      filter: saturate(0.8);
    }

    .product-card.selected-good {
      outline: 4px solid rgba(95, 145, 100, 0.8);
    }

    .product-card.selected-bad {
      outline: 4px solid rgba(169, 74, 59, 0.8);
    }

    .product-card.selected-view {
      outline: 4px solid rgba(241, 210, 131, 0.85);
    }

    .product-name {
      display: block;
      min-height: 34px;
      color: #24150e;
      font-weight: 900;
      line-height: 1.32;
    }

    .product-price {
      display: inline-block;
      margin: 8px 0;
      padding: 3px 7px;
      color: #21150d;
      background: #d8bd75;
      border: 1px solid #6e4a2e;
      font-size: 13px;
      font-weight: 800;
    }

    .product-detail {
      margin-top: 12px;
      padding: 14px;
      min-height: 112px;
      background:
        linear-gradient(180deg, rgba(231, 211, 165, 0.08), transparent 50%),
        rgba(22, 13, 9, 0.82);
    }

    .detail-name {
      margin: 0 0 8px;
      color: #f1d283;
      font-size: 18px;
      line-height: 1.35;
    }

    .detail-copy {
      margin: 0 0 10px;
      color: #ead9b3;
      line-height: 1.65;
    }

    .confirm-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .feedback-panel {
      position: relative;
      z-index: 2;
      margin-top: 10px;
      padding: 12px;
      min-height: 76px;
    }

    .feedback-text {
      margin: 0;
      color: #f3e5c2;
      font-size: 15px;
      line-height: 1.58;
    }

    .feedback-panel.good {
      border-color: rgba(95, 145, 100, 0.85);
      background: rgba(28, 51, 34, 0.74);
    }

    .feedback-panel.bad {
      border-color: rgba(169, 74, 59, 0.85);
      background: rgba(62, 29, 24, 0.74);
    }

    .next-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
      padding-right: 116px;
    }

    .next-btn {
      min-width: 150px;
      min-height: 46px;
      padding: 10px 18px;
      font-weight: 800;
    }

    .record-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 8px;
      padding-right: 0;
    }

    .record-item {
      padding: 10px;
      border: 1px solid rgba(231, 211, 165, 0.28);
      background: rgba(9, 6, 4, 0.42);
    }

    .after-sale-book-button {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 60;
      display: grid;
      place-items: center;
      gap: 4px;
      width: 92px;
      padding: 8px 6px;
      border: 2px solid rgba(240, 202, 114, 0.72);
      color: #f1d283;
      background: rgba(22, 13, 9, 0.82);
      box-shadow: 0 8px 0 rgba(0,0,0,0.28), 0 16px 26px rgba(0,0,0,0.32);
      cursor: pointer;
    }

    .after-sale-book-button:hover,
    .after-sale-book-button:focus-visible {
      filter: brightness(1.08);
      transform: translateY(-2px);
    }

    .book-icon-wrap {
      position: relative;
      width: 64px;
      height: 64px;
    }

    .book-icon-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .book-icon-open {
      display: none;
    }

    .after-sale-book-button:hover .book-icon-closed,
    .after-sale-book-button:focus-visible .book-icon-closed {
      display: none;
    }

    .after-sale-book-button:hover .book-icon-open,
    .after-sale-book-button:focus-visible .book-icon-open {
      display: block;
    }

    .book-label {
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      text-shadow: 0 2px 0 #140c08;
    }

    .after-sale-modal {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: grid;
      place-items: center;
      padding: 22px;
      background: rgba(9, 6, 4, 0.68);
    }

    .after-sale-dialog {
      width: min(980px, 100%);
      padding: 18px;
      border: 2px solid rgba(240, 202, 114, 0.72);
      background:
        linear-gradient(180deg, rgba(61, 35, 22, 0.96), rgba(21, 13, 9, 0.98)),
        repeating-linear-gradient(90deg, rgba(231, 211, 165, 0.04) 0 10px, transparent 10px 20px);
      box-shadow: 0 24px 56px rgba(0,0,0,0.48), inset 0 0 0 4px rgba(255,255,255,0.025);
    }

    .modal-title-row {
      display: grid;
      grid-template-columns: 120px 1fr auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 12px;
    }

    .modal-book-art {
      width: 120px;
      height: 84px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .modal-title {
      margin: 0;
      color: #f1d283;
      font-size: clamp(32px, 5vw, 52px);
      line-height: 1;
      text-shadow: 0 4px 0 #4c2d1d, 0 0 20px var(--glow);
    }

    .modal-close {
      min-height: 40px;
      padding: 8px 12px;
    }

    .modal-record-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 10px;
    }

    .confirm-sale-modal {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: grid;
      place-items: center;
      padding: 22px;
      background: rgba(9, 6, 4, 0.58);
    }

    .confirm-sale-dialog {
      width: min(520px, 100%);
      padding: 18px;
      border: 2px solid rgba(240, 202, 114, 0.72);
      background:
        linear-gradient(180deg, rgba(61, 35, 22, 0.98), rgba(21, 13, 9, 0.98));
      box-shadow: 0 20px 48px rgba(0,0,0,0.46), inset 0 0 0 4px rgba(255,255,255,0.025);
    }

    .confirm-sale-title {
      margin: 0 0 10px;
      color: #f1d283;
      font-size: 24px;
      line-height: 1.3;
    }

    .confirm-sale-copy {
      margin: 0 0 14px;
      color: #ead9b3;
      line-height: 1.65;
    }

    .record-title {
      margin: 0 0 6px;
      color: #f1d283;
      font-weight: 800;
    }

    .record-copy {
      margin: 0;
      color: #ead9b3;
      line-height: 1.6;
      font-size: 13px;
    }

    .after-sale-screen {
      padding: 22px;
    }

    .after-sale-panel {
      position: relative;
      z-index: 2;
      padding: 18px;
      margin-bottom: 18px;
      background:
        linear-gradient(180deg, rgba(69, 43, 27, 0.86), rgba(23, 14, 9, 0.88)),
        rgba(20, 12, 8, 0.72);
    }

    .after-sale-panel.good {
      border-color: rgba(95, 145, 100, 0.85);
    }

    .after-sale-panel.bad {
      border-color: rgba(169, 74, 59, 0.85);
    }

    .after-sale-title {
      margin: 0 0 8px;
      color: #f1d283;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.15;
    }

    .after-sale-copy {
      margin: 0 0 12px;
      color: #ead9b3;
      font-size: 17px;
      line-height: 1.75;
    }

    .result-line {
      display: inline-block;
      margin-top: 6px;
      padding: 7px 10px;
      color: #21150d;
      background: var(--paper);
      border: 2px solid #6e4a2e;
      font-weight: 800;
      line-height: 1.5;
    }

    .business.screen,
    .after-sale-screen {
      min-height: 100vh;
      border: 0;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(20, 12, 8, 0.08), rgba(12, 7, 5, 0.2)),
        url("shop-day.webp") center / cover no-repeat;
      box-shadow: none;
    }

    .app {
      width: 100%;
      padding: 0;
    }

    .business.scene-night,
    .after-sale-screen.scene-night {
      background:
        linear-gradient(180deg, rgba(5, 5, 10, 0.18), rgba(5, 3, 2, 0.32)),
        url("shop-night.webp") center / cover no-repeat;
    }

    .business.screen::before,
    .after-sale-screen::before {
      display: none;
    }

    .business {
      position: relative;
      padding: 12px 24px 12px 118px;
    }

    .business .stats-bar,
    .after-sale-screen .stats-bar {
      position: relative;
      z-index: 8;
      width: min(980px, calc(100vw - 176px));
      grid-template-columns: repeat(5, minmax(112px, 1fr));
      gap: 8px;
      margin: 0 0 10px;
    }

    .business .stat,
    .after-sale-screen .stat {
      min-height: 46px;
      padding: 7px 10px;
      background: rgba(18, 10, 7, 0.62);
      backdrop-filter: blur(2px);
    }

    .business .stat-label,
    .after-sale-screen .stat-label {
      margin-bottom: 4px;
      font-size: 12px;
    }

    .business .stat-value,
    .after-sale-screen .stat-value {
      font-size: 18px;
    }

    .business-grid {
      position: static;
      grid-template-columns: minmax(560px, 0.55fr) minmax(520px, 1fr);
      gap: 24px;
      min-height: 0;
      height: calc(100vh - 300px);
      min-height: 420px;
      align-items: stretch;
    }

    .customer-panel,
    .product-panel,
    .product-detail,
    .feedback-panel,
    .after-sale-panel {
      backdrop-filter: blur(2px);
    }

    .customer-panel {
      position: absolute;
      left: 200px;
      bottom: 210px;
      z-index: 2;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      gap: 12px;
      width: 540px;
      height: 510px;
      min-height: 0;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      transform: none;
    }

    .customer-panel .portrait {
      flex: 0 0 405px;
      width: 405px;
      height: 495px;
      margin: 0;
      border: 0;
      background-color: transparent;
      background-position: center bottom;
      background-repeat: no-repeat;
      background-size: contain;
      box-shadow: none;
      filter: drop-shadow(0 13px 13px rgba(0, 0, 0, 0.55));
      image-rendering: auto;
      opacity: 1;
      transform: none;
    }

    .customer-panel .portrait::before,
    .customer-panel .portrait::after {
      display: none;
    }

    .customer-panel .portrait.harry { background-image: url("char-harry.webp"); }
    .customer-panel .portrait.hermione { background-image: url("char-hermione.webp"); }
    .customer-panel .portrait.trial { background-image: url("char-trial.webp"); }
    .customer-panel .portrait.nightwizard { background-image: url("char-nightwizard.webp"); }
    .customer-panel .portrait.hagrid {
      background-image: url("char-hagrid.webp");
      flex-basis: 485px;
      width: 485px;
      height: 500px;
    }
    .customer-panel .portrait.draco { background-image: url("char-draco.webp"); }
    .customer-panel .portrait.theodore { background-image: url("char-theodore.webp"); }
    .customer-panel .portrait.ariana {
      background-image: url("char-ariana.webp");
      opacity: 0.86;
      filter: drop-shadow(0 0 18px rgba(220, 230, 255, 0.5));
    }
    .customer-panel .portrait.aberforth { background-image: url("char-aberforth.webp"); }
    .customer-panel .portrait.lupin { background-image: url("char-lupin.webp"); }
    .customer-panel .portrait.bowtruckle {
      background-image: url("char-bowtruckle.webp");
      flex-basis: 345px;
      width: 345px;
    }
    .customer-panel .portrait.crookshanks {
      background-image: url("char-crookshanks.webp");
      flex-basis: 450px;
      width: 450px;
      height: 390px;
    }
    .customer-panel .portrait.rita { background-image: url("char-rita.webp"); }
    .customer-panel .portrait.james {
      background-image: url("char-james.webp");
      opacity: 0.82;
      filter: drop-shadow(0 0 18px rgba(220, 230, 255, 0.42));
    }
    .customer-panel .portrait.snake {
      background-image: url("char-snake.webp");
      flex-basis: 450px;
      width: 450px;
      height: 360px;
    }
    .customer-panel .portrait.toad {
      background-image: url("char-toad.webp");
      flex-basis: 430px;
      width: 430px;
      height: 430px;
    }

    .toad-ending-screen .customer-panel.toad-panel {
      left: auto;
      right: 210px;
      justify-content: flex-end;
    }

    .toad-ending-screen .customer-panel.toad-panel .customer-name {
      margin: 0 -20px 22px 0;
    }

    .portrait {
      width: 112px;
      height: 112px;
      margin: 8px auto;
      transform: scale(1.15);
      transform-origin: bottom center;
    }

    .customer-name {

        const percent = Math.round((loadedCount / ASSET_PATHS.length) * 100);
        if (loadingBar) loadingBar.style.width = `${percent}%`;
        if (loadingPercent) loadingPercent.textContent = `${percent}%`;
      };

      return Promise.all(ASSET_PATHS.map((src) => new Promise((resolve) => {
        const image = new Image();
        image.onload = () => {
          updateProgress();
          resolve();
        };
        image.onerror = () => {
          updateProgress();
          resolve();
        };
        image.src = src;
      })));
    }

    function triggerRandomWalkInCustomer() {
      if (triggerTheodoreSecondVisit()) {
        return false;
      }

      const availableIds = randomCustomerIds.filter((id) => !gameState.randomCustomersVisited.includes(id));

      // 三位随机顾客都已经来过，就不再触发
      if (!availableIds.length) {
        return false;
      }

      // 从今天算起，后面还剩多少天
      const daysLeftIncludingToday = dayLabels.length - gameState.currentDayIndex;

      // 如果剩下的天数已经不够随便错过了，就强制安排随机顾客出现
      // 这样可以保证克鲁克山、护树罗锅、丽塔每局都会各出现一次
      const mustAppearNow = availableIds.length >= daysLeftIncludingToday - 1;

      // 还没到必须出现的时候，仍然保留一点随机性
      if (!mustAppearNow && Math.random() > RANDOM_CUSTOMER_CHANCE) {
        return false;
      }

      // 从还没出现过的随机顾客里抽一个
      const customerId = availableIds[Math.floor(Math.random() * availableIds.length)];

      // 随机安排在中午或下午
      const slot = Math.random() < 0.5 ? "中午" : "下午";

      // 记录这个顾客已经来过，避免重复出现
      gameState.randomCustomersVisited.push(customerId);
      gameState.randomCustomerSlots[customerId] = slot;

      showWalkInCustomer(customerId);
      return true;
    }

          "结果：旅行经费 +50，商店声誉 +5，混乱值 -2。"

    function normalizeDialogueHtml(html) {
      return html
        .replace(/(\s*<br\s*\/?>\s*)+/gi, "<br>")
        .replace(/<\/p>\s*<p/gi, "</p><p");
    }

    function stripDialogueResultLines(html) {
      return html
        .replace(/<span\b[^>]*class=["'][^"']*\bresult-line\b[^"']*["'][^>]*>[\s\S]*?<\/span>/gi, "")
        .replace(/<p\b[^>]*class=["'][^"']*\bresult-line\b[^"']*["'][^>]*>[\s\S]*?<\/p>/gi, "");
    }

    function splitDialoguePages(html, maxLength = DEFAULT_DIALOGUE_MAX_LENGTH) {
      const splitAutoPages = (chunk) => {
        const segments = chunk
        .replace(/<br\s*\/?>\s*<br\s*\/?>/gi, "<br><br>|")
        .replace(/([。！？])/g, "$1|")
        .split("|")
        .map((item) => item.trim())
        .filter(Boolean);
        const pages = [];
        let current = "";

        segments.forEach((segment) => {
          const plainLength = (current + segment).replace(/<[^>]+>/g, "").length;
          if (current && plainLength > maxLength) {
            pages.push(current);
            current = segment;
          } else {
            current += segment;
          }
        });

        if (current) pages.push(current);
        return pages;
      };

      const manualChunks = normalizeDialogueHtml(html)
        .split(DIALOGUE_PAGE_BREAK)
        .map((item) => item.trim())
        .filter(Boolean);
      const pages = manualChunks.flatMap((chunk) => splitAutoPages(chunk));
      return pages.length ? pages : [html];
    }

      const dialogueHtml = normalizeDialogueHtml(stripDialogueResultLines(html));
      const pages = splitDialoguePages(dialogueHtml, options.maxLength || DEFAULT_DIALOGUE_MAX_LENGTH);
      let pageIndex = 0;

      function renderPage() {
        content.innerHTML = pages[pageIndex];
        const hasMore = pageIndex < pages.length - 1;
        continueButton.classList.toggle("hidden", !hasMore);

        if (nextButton && options.showNextWhenDone) {
          nextButton.classList.toggle("hidden", hasMore);
        }
      }

      continueButton.onclick = () => {
        pageIndex = Math.min(pageIndex + 1, pages.length - 1);
        renderPage();
      };

      renderPage();
    }

    function selectProduct(productId) {
      if (gameState.hasSelectedToday) return;

      const customer = getActiveCustomer();
      const product = getProduct(productId);
      const rule = matchRules[customer.id];
      const isCorrect = productId === rule.productId;

      gameState.hasSelectedToday = true;
      gameState.selectedProductId = productId;

      if (customer.id === "hagridDay1") {
        handleHagridProduct(productId);
        if (gameState.toadEnding) {
          renderToadFiringScene();
          return;
        }
        renderCustomer();
        showFeedback(gameState.latestSelectionCorrect);
        return;
      }

      if (!gameState.hiddenEventActive && customer.id === "snakeDay5") {
        handleSnakeFirstVisitProduct(productId);
        renderCustomer();
        showFeedback(productId === "honestInk");
        return;

      if (!gameState.hiddenEventActive) {
        addCoins(product.price);
        if (product.id === "twoWayMirror") {
          unlockAchievement("跨越死亡的凝视", "你卖出了双面镜。被正确的人拿在手中时，它可能让人看见最想见到的人。");

        handleRandomCustomerProduct(productId);

        handleSpecialSingleCustomerProduct(productId);

        handleTheodoreFirstVisitProduct(productId);
      } else if (gameState.hiddenEventActive && customer.id === "theodoreSecond") {
        handleTheodoreSecondVisitProduct(productId);
      } else if (gameState.hiddenEventActive && customer.id === "jamesHidden") {
        recordRecommendation(isCorrect);
        const ghostCost = Math.min(gameState.coins, product.price);
        gameState.coins = Math.max(0, gameState.coins - product.price);
        if (isCorrect) {
          gameState.satisfaction = clamp(gameState.satisfaction + 10, 0, 100);
          gameState.trust = clamp(gameState.trust + 10, 0, 100);
          gameState.chaos = clamp(gameState.chaos - 5, 0, 100);

          const achievementNotice = unlockAchievement("父亲的感谢", "你帮助哈利做出了正确选择，也让一个迟来的守护有了落点。");

          gameState.satisfaction = clamp(gameState.satisfaction + 2, 0, 100);
          gameState.trust = clamp(gameState.trust + 2, 0, 100);
          gameState.jamesGiftPrepared = false;
          gameState.latestFeedback = `${customer.failFeedback}<br><strong>本次推荐：</strong>${product.name}。<br><span class="result-line">幽灵没有付款，旅行经费 -${ghostCost}。</span>`;
        }

        handleDracoFirstVisitProduct(productId);
      } else {
        recordRecommendation(isCorrect);
        if (isCorrect) {
          gameState.satisfaction = clamp(gameState.satisfaction + 8, 0, 100);
          gameState.trust = clamp(gameState.trust + 6, 0, 100);
          gameState.chaos = clamp(gameState.chaos - 4, 0, 100);

          if (customer.id === "lupinDay3") {

          gameState.latestFeedback = `${customer.failFeedback}<br><strong>本次售出：</strong>${product.name}。`;

    function showFeedback(isCorrect) {
  const feedbackPanel = document.querySelector("#feedbackPanel");
  const feedbackText = document.querySelector("#feedbackText");
  const nextButton = document.querySelector("#nextDayBtn");

  if (!feedbackPanel || !feedbackText || !nextButton) return;

  feedbackPanel.classList.remove("good", "bad");
  feedbackPanel.classList.add(isCorrect ? "good" : "bad");
  feedbackText.innerHTML = gameState.latestFeedback;

  if (getActiveCustomer().id === "nightWizard" && gameState.nightWizardRetry && !gameState.hasSelectedToday) {
    nextButton.classList.add("hidden");
    setDialoguePages(gameState.latestFeedback, { maxLength: 80 });
    return;
  }

  if (getActiveCustomer().id === "hagridDay1" && gameState.hagridRetry && !gameState.hasSelectedToday) {
    nextButton.classList.add("hidden");
    setDialoguePages(gameState.latestFeedback, { maxLength: 80 });
    return;
  }

  nextButton.textContent = getNextButtonLabel();
  nextButton.onclick = nextDay;

  setDialoguePages(gameState.latestFeedback, {
    showNextWhenDone: true,
    maxLength: 80
  });

}

        </div>
      `;

      document.body.appendChild(modal);
      document.querySelector("#closeTeaResultBtn").addEventListener("click", () => {
        modal.remove();
        nextDay();
      });
    }

    function showJamesEvent() {
      recordHiddenEvent("詹姆斯");
      gameState.hiddenEventActive = true;
      gameState.jamesVisited = true;
      gameState.activeCustomerId = "jamesHidden";
      gameState.hasSelectedToday = false;
      gameState.selectedProductId = null;
      gameState.selectedProductIds = [];
      gameState.shelfPage = 0;
      gameState.latestFeedback = "";
      renderCustomer();
    }

    function nextDay() {
      if (gameState.sameDayCustomerActive) {
        gameState.sameDayCustomerActive = false;
        gameState.activeCustomerId = null;
        gameState.hasSelectedToday = false;
        gameState.selectedProductId = null;
        gameState.selectedProductIds = [];
        gameState.shelfPage = 0;
        gameState.shelfOpen = false;
        gameState.latestFeedback = "";
        renderOpeningCustomer();
        return;
      }

      if (gameState.hiddenEventActive) {
        gameState.hiddenEventActive = false;
        gameState.activeCustomerId = null;

        if (gameState.pendingNextDayAfterHidden) {
          gameState.pendingNextDayAfterHidden = false;
          if (shouldTriggerJamesEvent()) {
            gameState.pendingNextDayAfterHidden = true;
            showJamesEvent();
            return;
          }
          advanceToNextDay();
          return;
        }

        gameState.hasSelectedToday = false;
        gameState.selectedProductId = null;
        gameState.selectedProductIds = [];
        gameState.shelfPage = 0;
        gameState.latestFeedback = "";
        renderOpeningCustomer();
        return;
      }

      if (triggerTheodoreFirstVisit()) {
        renderTheodoreFirstVisit();
        return;
      }

      if (shouldTriggerDracoTheodoreScene()) {
        renderDracoTheodoreScene();
        return;
      }

      if (triggerTheodoreConfession()) {
        return;
      }

      if (shouldTriggerTheodoreRoseLetter()) {
        renderTheodoreRoseLetterModal();
        return;
      }

      if (triggerEndOfDayExtraCustomer()) {
        return;
      }

      if (shouldTriggerSnakeSundayShield()) {
        renderSnakeSundayShieldEvent();
        return;
      }

      if (shouldTriggerJamesEvent()) {
        gameState.pendingNextDayAfterHidden = true;
        showJamesEvent();
        return;
      }

      advanceToNextDay();
    }

    function triggerEndOfDayExtraCustomer() {
      if (gameState.currentDayIndex === 1 && !gameState.aberforthVisited) {
        showExtraCustomer("aberforthDay2", true);
        return true;
      }

      if (gameState.currentDayIndex === 3 && gameState.arianaFirstSuccess && !gameState.arianaSecondVisited) {
        showExtraCustomer("arianaSecond", true);
        return true;
      }

      return false;
    }

    function advanceToNextDay() {
      if (gameState.currentDayIndex >= primaryCustomerIds.length - 1) {
        showWeeklyReview();
        return;
      }

      gameState.currentDayIndex += 1;
      startDay();
    }

    function getEnding() {
      const { coins, satisfaction, trust, chaos } = gameState;

      if (gameState.toadEnding) {
        return {
          title: "蟾蜍的臭靴子",
          text: "你居然被一只蟾蜍嫌弃了？"
        };
      }

      if (gameState.snakeEnding === "prisoner") {
        return {
          title: "囚徒",
          text: "你本来只是在魔法商店打七天零工。你本来只是想攒够去埃及旅行的钱。但你对那条黑蛇说了加油。从那一刻起，你不再是旁观者。手臂上的标记无法洗去。商店拒绝你再次进入，顾客们也不再相信你只是一次失误。后来有人问起你为什么会被赶出那家店。你想了很久，最后只说：“我以为那只是一句玩笑。”可魔法从来不把所有玩笑都当成玩笑。"
        };
      }

      if (gameState.snakeEnding === "earlyDeparture") {
        return {
          title: "提前出发",
          text: "你看着柜台上的 1700 银西可，忽然觉得七天试用期也没有那么重要了。第二天清晨，你没有再打开商店的门。你带着钱提前出发，去看金字塔、古墓咒文和魔法遗迹。至于哈利为什么没有再来，黑蛇到底拿着指南针去了哪里，商店门口为什么多了几片黑色鳞片。那已经不是临时工该管的事了。"
        };
      }

      if (gameState.theodoreDateAccepted && gameState.cleanEarnedCoins >= gameState.travelGoal && gameState.snakeEnding !== "earlyDeparture" && gameState.dracoBribeAccepted !== true) {
        return {
          title: "埃及前的一杯茶",
          text: "七天结束时，你终于数清了柜台里的银西可。1500 银西可，刚好够去埃及。你本该立刻出发。可离开商店前，你在店门口又看到了一束玫瑰。它安静地躺在那里，像一个没有催促的约定。所以你没有直接去车站，而是先去了那家信里写到的茶室。西奥多已经坐在那里，面前放着两只茶杯。他看起来比那天清醒得多，也比那天更紧张。他站起来，礼节周全得近乎古板。“谢谢你愿意来。”你坐下时，他没有立刻说喜欢，也没有提起迷情剂。他只是把一杯茶推到你面前，声音很低：“这一次，我是清醒的。”窗外的天色慢慢暗下去。你的埃及旅行没有取消。只是出发之前，多了一杯茶的时间。"
        };
      }

      if (chaos >= 80) {
        return {
          title: "售后灾难预备役",
          text: "这一周的账本赚到了钱，也攒下了足够让店长夜里坐起来的麻烦。好消息是你很有行动力，坏消息是售后登记簿已经开始自己发抖。"
        };
      }

      if (trust <= 30) {
        return {
          title: "被店长派去整理仓库",
          text: "店长没有开除你，只是递来一串沉甸甸的仓库钥匙。里面的扫帚会吵架，旧书会咳嗽，至少它们暂时不会要求退款。"
        };
      }

      if (coins >= gameState.travelGoal && satisfaction >= 70 && trust >= 70 && chaos <= 40) {
        return {
          title: "魔法商店明日之星",
          text: "你攒够了去埃及的旅行经费，也保住了顾客的安全感和商店的口碑。店长在账本上写下“可培养”，旁边还画了一颗很克制的小星星。"
        };
      }

      if (coins < gameState.travelGoal && satisfaction >= 70 && trust >= 70 && chaos <= 50) {
        return {
          title: "差点去成埃及",
          text: "你还没攒够钱，但商店口碑已经传开了。也许下周再打几天工，你就能真的出发，去看金字塔、古墓咒文和魔法遗迹。"
        };
      }

      if (satisfaction >= 75 && chaos <= 50) {
        return {
          title: "温柔可靠店员",
          text: "顾客们记住了你的耐心和判断力。也许你不是卖得最多的那一个，但很多人在离店时都把门轻轻带上了。"
        };
      }

      if (coins >= 220 && chaos > 50) {
        return {
          title: "销售天才但有点危险",
          text: "银西可叮当作响，货架也少了不少存货。至于为什么店里的钟开始倒着走，店长决定先数完钱再问你。"
        };
      }

      return {
        title: "普通实习店员",
        text: "你顺利完成了一周打工。没有惊天动地的名声，也没有炸掉柜台，这在魔法商店里已经算一种稳健的成绩。"
      };
    }

    function showWeeklyReview() {
      const hiddenEventsText = gameState.hiddenEvents.length ? gameState.hiddenEvents.join(" / ") : "无";
      const hasEnoughMoney = gameState.coins >= gameState.travelGoal;

      app.innerHTML = `
        <section class="screen ending-screen">
          <section class="ending-panel">
            <p class="eyebrow">一周复盘</p>
            <h1 class="ending-title">打工周报</h1>
            <p class="ending-copy">店长的账本自动翻到最后一页，把这一周发生过的事情整整齐齐地列了出来。</p>
            <div class="review-grid">
              <article class="review-item">
                <p class="review-label">本周接待顾客</p>
                <p class="review-value">${TOTAL_REGULAR_CUSTOMERS}/${TOTAL_REGULAR_CUSTOMERS}</p>
              </article>
              <article class="review-item">
                <p class="review-label">正确推荐</p>
                <p class="review-value">${gameState.correctRecommendations}/${TOTAL_RECOMMENDATION_SLOTS}</p>
              </article>
              <article class="review-item">
                <p class="review-label">错误推荐</p>
                <p class="review-value">${gameState.wrongRecommendations}/${TOTAL_RECOMMENDATION_SLOTS}</p>
              </article>
              <article class="review-item">
                <p class="review-label">触发售后</p>
                <p class="review-value">${afterSaleRecords.length}/${TOTAL_AFTER_SALE_SLOTS}</p>
              </article>
              <article class="review-item">
                <p class="review-label">触发隐藏事件</p>
                <p class="review-value">${gameState.hiddenEvents.length}/${TOTAL_HIDDEN_EVENTS}</p>
                <p class="achievement-desc">${hiddenEventsText}</p>
              </article>
              <article class="review-item">
                <p class="review-label">解锁成就</p>
                <p class="review-value">${gameState.achievements.length}/${TOTAL_ACHIEVEMENTS}</p>
              </article>
              <article class="review-item">
                <p class="review-label">旅行经费</p>
                <p class="review-value">${gameState.coins}/${gameState.travelGoal}</p>
              </article>
              <article class="review-item">
                <p class="review-label">正常经营收入</p>
                <p class="review-value">${gameState.cleanEarnedCoins}/${gameState.travelGoal}</p>
              </article>
              <article class="review-item">
                <p class="review-label">是否攒够旅行经费</p>
                <p class="review-value">${hasEnoughMoney ? "是" : "否"}</p>
              </article>
            </div>
            <button class="primary-btn restart-btn" type="button" id="showEndingBtn">查看最终结局</button>
          </section>
        </section>
      `;

      document.querySelector("#showEndingBtn").addEventListener("click", showEnding);
    }

    function showEnding() {
      const ending = getEnding();

      app.innerHTML = `
        <section class="screen ending-screen">
          <section class="ending-panel">
            <p class="eyebrow">一周营业结束</p>
            <h1 class="ending-title">${ending.title}</h1>
            <p class="ending-copy">${ending.text}</p>
            <div class="ending-stats">
              <div class="stat">
                <div class="stat-label">旅行经费</div>
                <div class="stat-value">${gameState.coins}/${gameState.travelGoal}</div>
              </div>
              <div class="stat">
                <div class="stat-label">顾客满意度</div>
                <div class="stat-value">${gameState.satisfaction}</div>
              </div>
              <div class="stat">
                <div class="stat-label">商店声誉</div>
                <div class="stat-value">${gameState.trust}</div>
              </div>
              <div class="stat">
                <div class="stat-label">混乱值</div>
                <div class="stat-value">${gameState.chaos}</div>
              </div>
            </div>
            ${renderAchievements()}
            ${renderTheodoreTeaRecord()}
            <button class="primary-btn restart-btn" type="button" id="restartBtn">重新打工</button>
          </section>
        </section>
      `;

      document.querySelector("#restartBtn").addEventListener("click", restartGame);
    }

    function renderTheodoreTeaRecord() {
      if (!gameState.theodoreDateRefused) return "";

      return `
        <section class="achievement-panel">
          <h2 class="panel-title">隐藏记录：未赴的茶约</h2>
          <p class="achievement-desc">你没有接受西奥多的邀请。那封信没有再出现，但有些话已经被听见了。</p>
        </section>
      `;
    }

    function unlockTheodoreAchievement(choice) {
      const records = {
        accept: {
          title: "未说破的答应",
          text: "你没有把那句表白立刻钉成答案，也没有假装自己没有听见。那一晚之后，西奥多留下了一封措辞古老的邀请函。真正的问题，被推迟到了清醒之后。"
        },
        refuse: {
          title: "克制的拒绝",
          text: "你指出了迷情剂的影响，也用一瓶解药承担了自己的失误。西奥多没有逃走，只是把那份失礼收回到清醒与礼节之中。"
        },
        calm: {
          title: "清醒之后再问我",
          text: "你没有否定他的心意，也没有接受药效制造出的冲动。你让他等清醒之后再问，而那封放在门口的信，像一个迟来的正式开场。"
        }
      };

      const record = records[choice];
      if (record) unlockAchievement(record.title, record.text);
    }

    function renderAchievements() {
      return `
        <section class="achievement-panel">
          <h2 class="panel-title">隐藏成就</h2>
          <div class="achievement-list">
            ${gameState.achievements.length === 0 ? `
              <p class="achievement-desc">本周没有解锁隐藏成就。</p>
            ` : gameState.achievements.map((achievement) => `
              <article class="achievement-item">
                <p class="achievement-name">${achievement.name}</p>
                <p class="achievement-desc">${achievement.description}</p>
              </article>
            `).join("")}
          </div>
        </section>
      `;
    }

    function restartGame() {
      gameState.currentDayIndex = 0;
      gameState.currentSlotIndex = 0;
      gameState.currentSlot = "开店前";
      gameState.coins = 0;
      gameState.cleanEarnedCoins = 0;
      gameState.satisfaction = 50;
      gameState.trust = 50;
      gameState.chaos = 0;
      gameState.hasSelectedToday = false;
      gameState.selectedProductId = null;
      gameState.selectedProductIds = [];
      gameState.latestFeedback = "";
      gameState.latestSelectionCorrect = false;
      gameState.correctRecommendations = 0;
      gameState.wrongRecommendations = 0;
      gameState.hiddenEvents = [];
      gameState.activeCustomerId = null;
      gameState.sameDayCustomerActive = false;
      gameState.hiddenEventActive = false;
      gameState.pendingNextDayAfterHidden = false;
      gameState.hagridVisited = false;
      gameState.hagridRetry = false;
      gameState.hagridHintShown = false;
      gameState.toadEnding = false;
      gameState.unlockedJames = false;
      gameState.jamesVisited = false;
      gameState.theodoreTrustUnlocked = false;
      gameState.theodoreDay3Correct = false;
      gameState.theodoreDay4Correct = false;
      gameState.theodoreSecondVisitTriggered = false;
      gameState.theodoreLovePotionAccident = false;
      gameState.theodoreConfessionHandled = false;
      gameState.theodoreConfessionChoice = null;
      gameState.theodoreRoseLetterUnlocked = false;
      gameState.theodoreRoseLetterShown = false;
      gameState.theodoreDateAccepted = false;
      gameState.theodoreDateRefused = false;
      gameState.dracoFirstVisited = false;
      gameState.dracoBoughtCorrectItem = false;
      gameState.dracoTheodoreConflictUnlocked = false;
      gameState.dracoTheodoreHarmonyUnlocked = false;
      gameState.dracoWarningTriggered = false;
      gameState.dracoBribeAccepted = false;
      gameState.dracoBribeRejected = false;
      gameState.jamesGiftPrepared = false;
      gameState.lupinTrustUnlocked = false;
      gameState.lupinMorningEventHandled = false;
      gameState.lupinAlbumEventTriggered = false;
      gameState.lupinAlbumAccepted = false;
      gameState.lupinAlbumAvailable = false;
      gameState.lupinAlbumGivenToHarry = false;
      gameState.lupinAlbumPromptKey = null;
      gameState.lupinHelpedInInjuredHarryEvent = false;
      gameState.jamesDittanyGivenToHarry = false;
      gameState.maraudersWatchUnlocked = false;
      gameState.snakeRoute = null;
      gameState.snakeSaturdayHandled = false;
      gameState.snakeSundayHandled = false;
      gameState.snakeEnding = null;
      gameState.skipHarryDay6 = false;
      gameState.routeCardCorrectSales = 0;
      gameState.maraudersMapUnlocked = false;
      gameState.borginVisited = false;
      gameState.borginOutcome = null;
      gameState.borginVisitDayIndex = null;
      gameState.borginFollowupHandled = false;
      gameState.aberforthVisited = false;
      gameState.aberforthCorrect = false;
      gameState.arianaFirstVisited = false;
      gameState.arianaFirstSuccess = false;
      gameState.arianaSecondVisited = false;
      gameState.nightWizardVisited = false;
      gameState.nightWizardRetry = false;
      gameState.randomCustomersVisited = [];
      gameState.randomCustomerSlots = {};
      gameState.achievements = [];
      afterSalePool.length = 0;
      afterSaleRecords.length = 0;
      renderCover();
      renderDevPanel();
    }

    bootGame();
  </script>
</body>
</html>
